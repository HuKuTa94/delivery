style:
  NewLineAtEndOfFile:
    active: false
  ReturnCount:
    max: 4
  AlsoCouldBeApply:
    active: true
  CanBeNonNullable:
    active: true
  ClassOrdering:
    active: true
  PreferToOverPairSyntax:
    active: true
  UnnecessaryAbstractClass:
    active: false

formatting:
  FinalNewline:
    active: false
  Indentation:
    active: false
  ImportOrdering:
    active: false
  Wrapping:
    active: false
  NoEmptyFirstLineInMethodBlock:
    active: false
  FunctionReturnTypeSpacing:
    active: false

complexity:
  CognitiveComplexMethod:
    active: true
    threshold: 5
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10

performance:
  SpreadOperator:
    active: false

naming:
  ConstructorParameterNaming:
    active: true
    privateParameterPattern: '[_a-z][A-Za-z0-9]*'

build:
  excludes: '**/generated/**'
  excludeCorrectable: false
  # Исправляет ошибки без предупреждения, чтобы реже гонять detekt, но нужно следить за изменениями
  # excludeCorrectable: true

comments:
  active: true
  OutdatedDocumentation:
    active: true
    matchTypeParameters: true
    matchDeclarationsOrder: true
    allowParamOnConstructorProperties: false